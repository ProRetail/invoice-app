<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Накладная</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:#f6f7fb}
header{height:60px;background:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid #ddd}
main{padding:12px}
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
.summary div,.field{background:#fff;border-radius:12px;padding:12px;border:1px solid #ddd}
.summary b{font-size:22px}
.tableWrap{overflow:auto;background:#fff;border-radius:12px;border:1px solid #ddd}
table{border-collapse:collapse;min-width:1400px;width:100%}
th,td{border:1px solid #e5e5e5;padding:6px;text-align:center}
th{background:#f5f5f5}
input{width:100%;border:0;background:transparent;padding:8px}
.photoBox{width:70px;height:70px;border:1px dashed #bbb;border-radius:10px;display:flex;align-items:center;justify-content:center;overflow:hidden;margin:auto;position:relative}
.photoBox input{display:none}
.photoBox img{width:100%;height:100%;object-fit:cover;display:none;cursor:zoom-in}
.photoBox.hasPhoto img{display:block}
.photoBox.hasPhoto span{display:none}
.delete{width:32px;height:32px;border:0;border-radius:8px;background:#ffeaea;color:#d00;font-size:20px}
.actions{display:grid;grid-template-columns:2fr 1fr 1fr;gap:10px;margin-top:12px}
.actions button{padding:14px;border-radius:12px;border:1px solid #ddd;background:#fff}
.actions .main{background:#1769ff;color:#fff;border-color:#1769ff}
.photoModal{
position:fixed;inset:0;background:rgba(0,0,0,.92);
display:none;align-items:center;justify-content:center;
z-index:9999;padding:20px
}
.photoModal.active{display:flex}
.photoModal img{
max-width:95vw;
max-height:95vh;
object-fit:contain;
border-radius:12px
}
.photoModal button{
position:absolute;top:20px;right:20px;
width:44px;height:44px;border:0;border-radius:50%;
font-size:28px;background:#fff
}
</style>
</head>
<body>
<header>
<h2>Накладная</h2>
<button onclick="addRow()">＋</button>
</header>

<main>
<div class="summary">
<div><span>Позиций</span><br><b id="rowsCount">0</b></div>
<div><span>Количество</span><br><b id="qtyCount">0</b></div>
<div><span>Сумма</span><br><b id="sumCount">0 ¥</b></div>
</div>

<div class="field">
<input id="clientName" placeholder="Имя клиента">
</div>

<div class="tableWrap">
<table>
<thead>
<tr>
<th>Товар</th>
<th>Фото</th>
<th>Цвет</th>
<th>XS</th>
<th>S</th>
<th>M</th>
<th>L</th>
<th>XL</th>
<th>Штук</th>
<th>Цена ¥</th>
<th>Сумма ¥</th>
<th></th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<div class="actions">
<button class="main" onclick="addRow()">Добавить</button>
<button onclick="savePDF()">PDF</button>
<button onclick="clearAll()">Очистить</button>
</div>
</main>

<div class="photoModal" id="photoModal">
<button onclick="closeZoom()">×</button>
<img id="zoomImg">
</div>

<script>
const tbody = document.getElementById("tbody");
let rows = [];

function addRow(){
  const row = {
    name:"",color:"",
    xs:0,s:0,m:0,l:0,xl:0,
    price:0,photo:""
  };
  rows.push(row);
  render();
}

function qty(r){
  return (+r.xs||0)+(+r.s||0)+(+r.m||0)+(+r.l||0)+(+r.xl||0);
}

function sum(r){
  return qty(r)*(+r.price||0);
}

function totals(){
  let q=0,s=0;
  rows.forEach(r=>{
    q+=qty(r);
    s+=sum(r);
  });
  document.getElementById("rowsCount").innerText=rows.length;
  document.getElementById("qtyCount").innerText=q;
  document.getElementById("sumCount").innerText=s+" ¥";
}

function render(){
  tbody.innerHTML="";
  rows.forEach((r,i)=>{
    const tr=document.createElement("tr");
    tr.innerHTML=`
<td><input value="${r.name}" onchange="rows[${i}].name=this.value"></td>
<td>
<label class="photoBox ${r.photo?'hasPhoto':''}">
<input type="file" accept="image/*">
<img src="${r.photo}">
<span>＋</span>
</label>
</td>
<td><input value="${r.color}" onchange="rows[${i}].color=this.value"></td>
<td><input type="number" value="${r.xs}" onchange="rows[${i}].xs=this.value;render()"></td>
<td><input type="number" value="${r.s}" onchange="rows[${i}].s=this.value;render()"></td>
<td><input type="number" value="${r.m}" onchange="rows[${i}].m=this.value;render()"></td>
<td><input type="number" value="${r.l}" onchange="rows[${i}].l=this.value;render()"></td>
<td><input type="number" value="${r.xl}" onchange="rows[${i}].xl=this.value;render()"></td>
<td>${qty(r)}</td>
<td><input type="number" value="${r.price}" onchange="rows[${i}].price=this.value;render()"></td>
<td>${sum(r)}</td>
<td><button class="delete" onclick="removeRow(${i})">×</button></td>
`;
    const fileInput = tr.querySelector('input[type="file"]');
    fileInput.addEventListener("change", e=>{
      const file=e.target.files[0];
      const reader=new FileReader();
      reader.onload=()=>{
        rows[i].photo=reader.result;
        render();
      };
      reader.readAsDataURL(file);
    });

    const img = tr.querySelector("img");
    img.addEventListener("click", ()=>{
      if(!r.photo) return;
      document.getElementById("zoomImg").src = r.photo;
      document.getElementById("photoModal").classList.add("active");
    });

    tbody.appendChild(tr);
  });
  totals();
}

function removeRow(i){
  rows.splice(i,1);
  render();
}

function closeZoom(){
  document.getElementById("photoModal").classList.remove("active");
}

function clearAll(){
  rows=[];
  render();
}

function savePDF(){
  alert("PDF сохранение остается как в прошлой версии.");
}

addRow();
</script>
</body>
</html>
