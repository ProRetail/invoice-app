<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Накладная ProRetail</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:#f6f7fb;color:#111}
header{height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:#fff;border-bottom:1px solid #e8e8e8;position:sticky;top:0;z-index:5}
header h1{font-size:26px;margin:0;font-weight:800}
header button{border:0;background:#fff;font-size:30px;color:#1769ff;cursor:pointer}
main{padding:12px}
.topFields{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.fieldBox{background:#fff;border:1px solid #e0e3ed;border-radius:14px;padding:10px}
.fieldBox label{display:block;font-size:13px;color:#777;margin-bottom:4px}
.fieldBox input{width:100%;border:0;font-size:18px;outline:none;padding:8px;background:transparent;text-align:left}
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.summary div{background:#fff;border:1px solid #e0e3ed;border-radius:14px;padding:14px}
.summary span{display:block;color:#777;font-size:15px;margin-bottom:6px}
.summary b{font-size:30px}
.tableWrap{overflow:auto;background:#fff;border:1px solid #ddd;border-radius:14px;max-height:62vh}
table{border-collapse:collapse;min-width:1500px;width:100%}
th,td{border:1px solid #e3e3e3;padding:6px;text-align:center;vertical-align:middle}
th{background:#f7f7f7;font-size:14px;position:sticky;top:0;z-index:2;white-space:nowrap;line-height:1.1}
td:first-child,th:first-child{text-align:left;min-width:170px;position:sticky;left:0;background:#fff;z-index:1}
th:first-child{background:#f7f7f7;z-index:3}
.sizeCol{min-width:66px;white-space:nowrap}
input{width:100%;border:0;background:transparent;text-align:center;font-size:16px;outline:none;padding:8px 4px}
td:first-child input{text-align:left}
input.small{font-size:13px;color:#6b7280}
.photoBox{width:72px;height:72px;border:1px dashed #aaa;border-radius:10px;display:flex;align-items:center;justify-content:center;margin:auto;overflow:hidden;background:#fafafa;cursor:pointer;position:relative}
.photoBox input{display:none}
.photoBox img{width:100%;height:100%;object-fit:cover;display:none;cursor:zoom-in}
.photoBox.hasPhoto span{display:none}
.photoBox.hasPhoto img{display:block}
.qty,.sum,tfoot td{font-weight:700;background:#fbfbfb}
.delete{border:0;background:#ffefef;color:#d11;border-radius:8px;font-size:20px;width:32px;height:32px;padding:0;line-height:1;cursor:pointer}
.actions{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:10px;margin-top:14px}
.actions button{border:1px solid #d9dce7;background:#fff;border-radius:14px;padding:15px;font-size:16px;cursor:pointer}
.actions .primary{background:#1769ff;color:#fff;border-color:#1769ff}
.actions .pdf{background:#111;color:#fff;border-color:#111}
.note{font-size:12px;color:#666;margin-top:8px;line-height:1.35}
.photoModal{position:fixed;inset:0;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;z-index:99999;padding:18px}
.photoModal.active{display:flex}
.photoModal img{max-width:96vw;max-height:92vh;object-fit:contain;border-radius:12px;background:#fff}
.photoModal button{position:absolute;top:16px;right:16px;width:46px;height:46px;border:0;border-radius:50%;font-size:30px;background:#fff;cursor:pointer}
@media(max-width:700px){
  main{padding:10px}
  .topFields{grid-template-columns:1fr}
  .summary{grid-template-columns:1fr 1fr 1fr}
  .summary div{padding:10px}
  .summary b{font-size:28px}
  .actions{grid-template-columns:1fr}
  table{min-width:1500px}
  .sizeCol{min-width:66px}
}
</style>
</head>
<body>
<header><button id="menuBtn">☰</button><h1>Накладная</h1><button id="addBtnTop">＋</button></header>
<main>
<section class="topFields">
  <div class="fieldBox"><label>Имя клиента</label><input id="clientName" placeholder="Например: Иванов"></div>
  <div class="fieldBox"><label>Номер накладной</label><input id="invoiceNumber" placeholder="Например: 001"></div>
</section>

<section class="summary">
  <div><span>Позиций</span><b id="totalRows">0</b></div>
  <div><span>Количество</span><b id="totalQty">0</b></div>
  <div><span>Сумма</span><b id="totalSum">0 ¥</b></div>
</section>

<div class="tableWrap">
<table>
<thead><tr>
  <th>Наименование<br><small>артикул</small></th>
  <th>Фото</th>
  <th>Цвет</th>
  <th class="sizeCol">F</th>
<th class="sizeCol">XS/28</th>
<th class="sizeCol">S/29</th>
<th class="sizeCol">M/30</th>
<th class="sizeCol">L/31</th>
<th class="sizeCol">XL/32</th>
<th class="sizeCol">XXL/33</th>
<th class="sizeCol">3XL/34</th>
<th class="sizeCol">4XL/35</th>
<th class="sizeCol">36</th>
<th class="sizeCol">38</th>
<th class="sizeCol">40</th>
<th class="sizeCol">42</th>
  <th>Штук</th>
  <th>Цена ¥</th>
  <th>Сумма ¥</th>
  <th></th>
</tr></thead>
<tbody id="tbody"></tbody>
<tfoot><tr>
  <td colspan="3">ИТОГО</td>
  <td class="sizeCol" id="sum_f">0</td>
<td class="sizeCol" id="sum_xs28">0</td>
<td class="sizeCol" id="sum_s29">0</td>
<td class="sizeCol" id="sum_m30">0</td>
<td class="sizeCol" id="sum_l31">0</td>
<td class="sizeCol" id="sum_xl32">0</td>
<td class="sizeCol" id="sum_xxl33">0</td>
<td class="sizeCol" id="sum_xxxl34">0</td>
<td class="sizeCol" id="sum_xxxxl35">0</td>
<td class="sizeCol" id="sum_size36">0</td>
<td class="sizeCol" id="sum_size38">0</td>
<td class="sizeCol" id="sum_size40">0</td>
<td class="sizeCol" id="sum_size42">0</td>
  <td id="footQty">0</td>
  <td></td>
  <td id="footSum">0</td>
  <td></td>
</tr></tfoot>
</table>
</div>

<section class="actions">
  <button class="primary" id="addBtn">＋ Добавить строку</button>
  <button class="pdf" id="pdfBtn">Сохранить PDF</button>
  <button id="exportBtn">CSV</button>
  <button id="clearBtn">Очистить</button>
</section>
<div class="note">Фото в таблице можно открыть крупно по нажатию. PDF сохраняется с именем: Накладная_номер_клиент_дата.pdf</div>
</main>

<div class="photoModal" id="photoModal">
  <button id="closePhoto">×</button>
  <img id="modalImage" src="">
</div>

<template id="rowTemplate">
<tr>
  <td><input data-field="name" placeholder="Футболка"><input data-field="article" placeholder="25035" class="small"></td>
  <td><label class="photoBox"><input type="file" accept="image/*" data-field="photo"><img><span>＋</span></label></td>
  <td><input data-field="color" placeholder="черный"></td>
  <td class="sizeCol"><input type="number" min="0" inputmode="numeric" data-field="f"></td>
<td class="sizeCol"><input type="number" min="0" inputmode="numeric" data-field="xs28"></td>
<td class="sizeCol"><input type="number" min="0" inputmode="numeric" data-field="s29"></td>
<td class="sizeCol"><input type="number" min="0" inputmode="numeric" data-field="m30"></td>
<td class="sizeCol"><input type="number" min="0" inputmode="numeric" data-field="l31"></td>
<td class="sizeCol"><input type="number" min="0" inputmode="numeric" data-field="xl32"></td>
<td class="sizeCol"><input type="number" min="0" inputmode="numeric" data-field="xxl33"></td>
<td class="sizeCol"><input type="number" min="0" inputmode="numeric" data-field="xxxl34"></td>
<td class="sizeCol"><input type="number" min="0" inputmode="numeric" data-field="xxxxl35"></td>
<td class="sizeCol"><input type="number" min="0" inputmode="numeric" data-field="size36"></td>
<td class="sizeCol"><input type="number" min="0" inputmode="numeric" data-field="size38"></td>
<td class="sizeCol"><input type="number" min="0" inputmode="numeric" data-field="size40"></td>
<td class="sizeCol"><input type="number" min="0" inputmode="numeric" data-field="size42"></td>
  <td class="qty">0</td>
  <td><input type="number" min="0" inputmode="decimal" data-field="price" placeholder="0"></td>
  <td class="sum">0</td>
  <td><button class="delete" title="Удалить">×</button></td>
</tr>
</template>

<script src="https://cdn.jsdelivr.net/npm/pdfmake@0.2.7/build/pdfmake.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pdfmake@0.2.7/build/vfs_fonts.js"></script>
<script>
const sizeFields = ["f", "xs28", "s29", "m30", "l31", "xl32", "xxl33", "xxxl34", "xxxxl35", "size36", "size38", "size40", "size42"];
const sizeLabels = ["F", "XS/28", "S/29", "M/30", "L/31", "XL/32", "XXL/33", "3XL/34", "4XL/35", "36", "38", "40", "42"];
const tbody = document.querySelector("#tbody");
const template = document.querySelector("#rowTemplate");
const money = n => new Intl.NumberFormat("ru-RU").format(Number(n) || 0) + " ¥";

let rows = JSON.parse(localStorage.getItem("invoiceRowsFinalV3") || "[]");
let clientName = localStorage.getItem("invoiceClientFinalV3") || "";
let invoiceNumber = localStorage.getItem("invoiceNumberFinalV3") || "";

const photoModal = document.querySelector("#photoModal");
const modalImage = document.querySelector("#modalImage");
document.querySelector("#closePhoto").addEventListener("click", () => photoModal.classList.remove("active"));
photoModal.addEventListener("click", e => { if(e.target === photoModal) photoModal.classList.remove("active"); });

function num(v){ return Number(String(v || "").replace(",", ".")) || 0; }
function emptyRow(){ const r={name:"",article:"",photo:"",color:"",price:0}; sizeFields.forEach(f=>r[f]=0); return r; }
function save(){ 
  localStorage.setItem("invoiceRowsFinalV3", JSON.stringify(rows)); 
  localStorage.setItem("invoiceClientFinalV3", clientName); 
  localStorage.setItem("invoiceNumberFinalV3", invoiceNumber); 
}
function rowQty(r){ return sizeFields.reduce((s,f)=>s+num(r[f]),0); }
function rowSum(r){ return rowQty(r)*num(r.price); }
function updateRow(tr,r){ tr.querySelector(".qty").textContent=rowQty(r); tr.querySelector(".sum").textContent=rowSum(r); }

function renderTotals(){
  const tq=rows.reduce((s,r)=>s+rowQty(r),0);
  const ts=rows.reduce((s,r)=>s+rowSum(r),0);
  document.querySelector("#totalRows").textContent=rows.length;
  document.querySelector("#totalQty").textContent=tq;
  document.querySelector("#totalSum").textContent=money(ts);
  document.querySelector("#footQty").textContent=tq;
  document.querySelector("#footSum").textContent=ts;
  sizeFields.forEach(f=>document.querySelector("#sum_"+f).textContent=rows.reduce((s,r)=>s+num(r[f]),0));
}

function render(){
  tbody.innerHTML="";
  rows.forEach((row,index)=>{
    sizeFields.forEach(f=>row[f]=num(row[f]));
    row.price=num(row.price);
    const tr=template.content.cloneNode(true).querySelector("tr");

    tr.querySelectorAll("input[data-field]").forEach(input=>{
      const field=input.dataset.field;
      if(field!=="photo") input.value=row[field]||"";
      input.addEventListener("input",()=>{
        if(field==="photo") return;
        rows[index][field]=input.type==="number"?num(input.value):input.value;
        updateRow(tr,rows[index]);
        renderTotals();
        save();
      });
      if(field==="photo") input.addEventListener("change",e=>{
        const file=e.target.files[0]; if(!file) return;
        const reader=new FileReader();
        reader.onload=()=>{ rows[index].photo=reader.result; save(); render(); };
        reader.readAsDataURL(file);
      });
    });

    const box=tr.querySelector(".photoBox"), img=box.querySelector("img");
    if(row.photo){
      img.src=row.photo;
      box.classList.add("hasPhoto");
      img.addEventListener("click",e=>{
        e.preventDefault();
        e.stopPropagation();
        modalImage.src=row.photo;
        photoModal.classList.add("active");
      });
    }

    tr.querySelector(".delete").addEventListener("click",()=>{ rows.splice(index,1); save(); render(); });
    updateRow(tr,row);
    tbody.appendChild(tr);
  });
  renderTotals();
}

function addRow(){ rows.push(emptyRow()); save(); render(); }

function cleanFileName(text){
  return String(text || "").trim().replace(/[\\/:*?"<>|]/g, "").replace(/\s+/g, "_").slice(0, 80);
}
function getPdfFileName(){
  const date = new Date().toLocaleDateString("ru-RU").replaceAll(".", "-");
  const client = cleanFileName(clientName) || "Клиент";
  const number = cleanFileName(invoiceNumber);
  return number ? `Накладная_${number}_${client}_${date}.pdf` : `Накладная_${client}_${date}.pdf`;
}

function exportPDF(){
  if(!window.pdfMake){ alert("Для создания PDF нужен интернет при первом открытии."); return; }
  const tq=rows.reduce((s,r)=>s+rowQty(r),0), ts=rows.reduce((s,r)=>s+rowSum(r),0);
  const dateText = new Date().toLocaleDateString("ru-RU");

  const body=[[
    {text:"Наименование",bold:true},{text:"Артикул",bold:true},{text:"Фото",bold:true},{text:"Цвет",bold:true},
    ...sizeLabels.map(s=>({text:s,bold:true,noWrap:true})),{text:"Штук",bold:true},{text:"Цена ¥",bold:true},{text:"Сумма ¥",bold:true}
  ]];

  rows.forEach(r=>body.push([
    r.name||"",
    r.article||"",
    r.photo?{image:r.photo,width:34,height:34,fit:[34,34]}:"",
    r.color||"",
    ...sizeFields.map(f=>({text:String(r[f]||""), noWrap:true})),
    String(rowQty(r)),
    String(r.price||""),
    String(rowSum(r))
  ]));

  body.push([
    {text:"ИТОГО",bold:true},"","","",
    ...sizeFields.map(f=>({text:String(rows.reduce((s,r)=>s+num(r[f]),0)),bold:true,noWrap:true})),
    {text:String(tq),bold:true},"",{text:String(ts),bold:true}
  ]);

  const doc={
    pageSize:"A4",
    pageOrientation:"landscape",
    pageMargins:[10,12,10,12],
    content:[
      {text:"НАКЛАДНАЯ",fontSize:16,bold:true,alignment:"left",margin:[0,0,0,4]},
      {columns:[
        {text:`Клиент: ${clientName || "—"}`,fontSize:10,bold:true},
        {text:`№: ${invoiceNumber || "—"}`,fontSize:10,bold:true,alignment:"center"},
        {text:`Дата: ${dateText}`,fontSize:10,bold:true,alignment:"right"}
      ], margin:[0,0,0,8]},
      {text:`Позиций: ${rows.length}   Количество: ${tq}   Итоговая сумма: ${ts} ¥`,fontSize:10,bold:true,margin:[0,0,0,8]},
      {
        table:{headerRows:1,widths:[50,34,38,34,...sizeFields.map(()=>24),24,28,32],body},
        layout:{
          hLineWidth:()=>0.4,
          vLineWidth:()=>0.4,
          paddingLeft:()=>2,
          paddingRight:()=>2,
          paddingTop:()=>2,
          paddingBottom:()=>2
        }
      },
      {text:`ИТОГО К ОПЛАТЕ: ${ts} ¥`,fontSize:15,bold:true,alignment:"right",margin:[0,10,0,0]}
    ],
    defaultStyle:{font:"Roboto",fontSize:6.5,alignment:"center"}
  };

  pdfMake.createPdf(doc).download(getPdfFileName());
}

function exportCSV(){
  const header=["Наименование","Артикул","Фото","Цвет",...sizeLabels,"Штук","Цена ¥","Сумма ¥"];
  const lines=[header.join(";")];
  rows.forEach(r=>lines.push([r.name,r.article,"",r.color,...sizeFields.map(f=>r[f]||0),rowQty(r),r.price||0,rowSum(r)].map(v=>`"${String(v??"").replaceAll('"','""')}"`).join(";")));
  const blob=new Blob(["\ufeff"+lines.join("\n")],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=(cleanFileName(clientName)||"zakaz")+".csv";
  a.click();
}

document.querySelector("#clientName").value=clientName;
document.querySelector("#invoiceNumber").value=invoiceNumber;
document.querySelector("#clientName").addEventListener("input",e=>{clientName=e.target.value;save();});
document.querySelector("#invoiceNumber").addEventListener("input",e=>{invoiceNumber=e.target.value;save();});
document.querySelector("#addBtn").addEventListener("click",addRow);
document.querySelector("#addBtnTop").addEventListener("click",addRow);
document.querySelector("#pdfBtn").addEventListener("click",exportPDF);
document.querySelector("#exportBtn").addEventListener("click",exportCSV);
document.querySelector("#clearBtn").addEventListener("click",()=>{if(confirm("Очистить накладную?")){rows=[];save();render();}});
if(rows.length===0){ rows=[emptyRow()]; save(); }
render();
</script>
</body>
</html>
